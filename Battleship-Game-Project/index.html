<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battleship Game</title>
    <style>
        body{
            margin:0;
            padding:0;
            background-color:tomato;
            display:flex;
            flex-direction:column;
            justify-content:space-around;
            align-items:center;
        }
        h1{
            text-decoration:underline;
            color:white;
            text-decoration-color:hsl(0, 50%, 76%);
        }
        .grid-box{
            width:60%;
            height:70vh;
            display:grid;
            grid-template-columns:1fr 1fr 1fr 1fr;
            grid-template-rows:auto;
        }
        .item{
            border:solid snow;
            width:100%;
            height:100%;
        }
        .reset{
            margin-top:3%;
            box-shadow:3px 3px 3px 3px rgb(226, 156, 156);color:black;
            background-color:white;
            border-radius:13%;
            border:0px;
            padding:1% 3%;
            font-weight:bold;
        }
        .dialog{
            position: absolute;
            width: 30%;
            margin: auto;
            text-align: center;
            border-radius:10px;
            border:0px;
            

        }
        .result{
            font-weight:bold;

        }
        .dismiss{
            
            border-radius:5px;
            padding:3%;
            border:1px solid white;
            background-color:blue;
            color:white;

        }
        .dismiss:hover{
            color:blue;
            border:1px solid blue;
            background-color:white;


        }
    </style>
</head>
<body>
    <h1>Battleship</h1>
    <div class="grid-box">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
      
    </div>
    <button class="reset">Reset</button>
    <dialog class="dialog">
        <h3 class="result"></h3>
        <button class="dismiss">Dismiss</button>
    </dialog>
    <script>
        
let t = 0;  
let s = 0;  


const dialog = document.querySelector(".dialog");
const result = document.querySelector(".result");

document.querySelector(".grid-box").addEventListener("click", (event) => {

    if (!event.target.classList.contains("item") || t >= 8 || s==5 || event.target.style.backgroundImage) return;

    let p = Math.random() * 100;

    if (p>=50) {
        event.target.style.backgroundImage =
        "url('https://ik.imagekit.io/d9mvewbju/Course/BigbinaryAcademy/battleship-image_e6bWCZ1w4.png')";
        s++;
    } else {
        event.target.style.backgroundImage =
        "url('https://ik.imagekit.io/d9mvewbju/Course/BigbinaryAcademy/seamless-pattern-waves-various-shades-blue-vector-underwater-design-96891651_aSd5pmbaM.webp')";
        
    }

    event.target.style.backgroundSize = "cover";
    t++;

    if (t === 8 || s===5) {
        if (s === 5) {
            result.innerText = "You Win!";
            result.style.color = "green";
        } else {
            result.innerText = "You Lost!";
            result.style.color = "red";
        }

        dialog.show();
    }
});

document.querySelector(".dismiss").addEventListener("click", () => {
    dialog.close();
});

document.querySelector(".reset").addEventListener("click", () => {
    document.querySelectorAll(".item").forEach(i => i.style.backgroundImage = "");
    t = 0;
    s = 0;
    
});

        
    </script>
</body>
</html>
