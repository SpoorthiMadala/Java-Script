<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To Do List</title>
  <style>
    body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-color: #f7f8fc;
  color: #333;

}

.container {
  width: 70%;
  margin: 6% auto;
  background-color: white;
  border-radius: 10px;
  padding: 2%;
  color:#333;

}

header {
  background-color: #3f51b5;
  color: white;
  padding: 2% 5%;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header input {
  padding: 2%;
  border-radius: 6px;
  border: none;
  width: 30%;
}

.task-input {
  display: grid;
  grid-template-columns:2fr 2fr 2fr 1fr;
  grid-gap: 1%;
  margin: 2% 0;
  padding:2% 1%;
  box-shadow:0.3px 0.3px 5px 1px lightgray;
  border-radius:7px;
}

.task-input input {
  padding: 4%;
  border: 1px solid #ccc;
  border-radius: 6px;
  color:#333;
}

.task-input button {
  background: #4caf50;
  color: white;
  border: none;
  padding: 2% 3%;
  border-radius: 6px;
}

.task-input button:hover {
  background: #388e3c;
}

.section-title {
  color: #3f51b5;
  margin-top: 3%;
}

.date-group {
  
  padding: 2%;
  border-radius: 6px;
  margin-top: 2%;
}

.task-item {
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid #ddd;
  padding: 1.5% 0;
}

.task-time {
  color: #0a0000;
  font-weight: bold;
}

button.edit {
  background: #ffca28;
  border: none;
  padding: 6% 12%;
  border-radius: 5px;
  margin-right: 1%;
  color:#333;
  margin-right:20%;
}

button.edit:hover {
  background: #fbc02d;
}

button.delete {
  background: #f44336;
  color: white;
  border: none;
  padding: 6% 12%;
  border-radius: 5px;
  margin-right:38%;
}

button.delete:hover {
  background: #d32f2f;
}

#dialog{
    border:1px solid green;
    width:40%;
    box-shadow:2px 2px 3px 3px white;
    position:absolute;
    margin:auto;
    border-radius:5px;
    background-color:white;
    color:black;
    text-align:center;
    box-shadow:3px 3px 3px 1px lightgray;
}
#dismiss{
    background-color:green;
    color:white;
    border-radius:3px;
    border:0px;
    padding:2% 3%;
}
#dismiss:hover{
    background-color:white;
    color:green;
    border-radius:3px;
    border:solid green;
}
#dialogedit{
    background-color:white;
    border:1px solid green;
    width:40%;
    box-shadow:3px 3px 3px 1px lightgray;
    position:absolute;
    margin:auto;
    text-align:center;
    padding:3%;
    border-radius:8px;

}
#editbutton{
    background-color:green;
    border:0px;
    color:white;
    padding:2% 3%;
    border-radius:3px;

}
#editbutton:hover{
    border:solid green;
    background-color:white;
    color:green;
}
#buttonspan{
    display:flex;
    justify-content:center;

}
#dialogedit input[type='text']{
    outline:none;
    border:solid black;
}


  </style>
</head>
<body>

<div class="container">

  <header>
    <h1>To-Do List</h1>
    <input type="text" id="search" placeholder="Search tasks...">
  </header>


  

  <div class="task-input">
    <input type="text" id="taskText" placeholder="Add your task here">
    <input type="date" id="taskDate">
    <input type="time" id="taskTime">
    <button id="add">Add Task</button>
  </div>
  <dialog id="dialog">
    <p>Please fill in all fields.</p>
    <button id="dismiss">OK</button>

</dialog>
<dialog id="dialogedit">
    <input type="text" id="edit" placeholder="Edit the task">
    <br><br>
    <button id="editbutton">Edit</button>
</dialog>


  <div id="tasksContainer"></div>
  

</div>


<script>
const container = document.getElementById("tasksContainer");
const searchInput = document.getElementById("search");
const dialog=document.querySelector("#dialog");
const dialogedit=document.getElementById("dialogedit");

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}



function formatTime(time) {
  let [h, m] = time.split(":");
  h = Number(h);
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return `${h}:${m} ${ampm}`;
}

function addTask() {
  const text = document.getElementById("taskText").value.trim();
  const date = document.getElementById("taskDate").value;
  const time = document.getElementById("taskTime").value;

  if (!text || !date || !time) {
    dialog.show();
    return;
  }

  tasks.push({ id: Date.now(), text, date, time });
  saveTasks();
  renderTasks();

  document.getElementById("taskText").value = "";
  document.getElementById("taskDate").value = "";
  document.getElementById("taskTime").value = "";
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  renderTasks();
}

function editTask(id) {
  dialogedit.show();
  
  const newText = document.querySelector("#edit").value;
  if (!newText) return;
  tasks.find(t => t.id === id).text = newText;
  saveTasks();
  renderTasks();
}
document.querySelector("#editbutton").addEventListener("click",()=>{dialogedit.close();})

function renderTasks(filter = "") {
  container.innerHTML = "";

  
  if (filter.trim() !== "") {

    const matched = tasks.filter(task =>
      task.text.toLowerCase().includes(filter.toLowerCase())
    );

    if (matched.length === 0) {
      container.innerHTML = "<p>No matching tasks found</p>";
      return;
    }

    matched.forEach(task => {
      const item = document.createElement("div");
      item.className = "task-item";

      item.innerHTML = `
        <span>${task.text} on ${task.date} at 
        <span class="task-time">${formatTime(task.time)}</span></span>
        <span>
          <button class="edit" onclick="editTask(${task.id})">Edit</button>
          <button class="delete" onclick="deleteTask(${task.id})">Delete</button>
        </span>
      `;

      container.appendChild(item);
    });

    return; 
  }

  const today = new Date().toDateString();

  const due = tasks.filter(t =>
    new Date(t.date).getDate() < new Date(today).getDate()
  );

  const todayTasks = tasks.filter(t =>
    new Date(t.date).toDateString() === today
  );

  const upcoming = tasks.filter(t =>
    new Date(t.date).getDate() > new Date(today).getDate()
  );

  displaySection("Due Tasks", due);
  displaySection("Today", todayTasks);
  displaySection("Upcoming Tasks", upcoming);
}
function displaySection(title, list, filter="") {
  if (!list.length) return;

  const section = document.createElement("div");
  section.innerHTML = `<h2 class="section-title">${title}</h2>`;
  container.appendChild(section);

  const grouped = {};

  list.forEach(task => {
    if (!grouped[task.date]) grouped[task.date] = [];
    grouped[task.date].push(task);
  });

  for (let date in grouped) {
    const groupDiv = document.createElement("div");
    groupDiv.classList.add("date-group");
    groupDiv.innerHTML = `<strong>${date}</strong>`;

    grouped[date].forEach(task => {
      if (filter && !task.text.toLowerCase().includes(filter.toLowerCase())) return;

      const item = document.createElement("div");
      item.className = "task-item";

      item.innerHTML = `
        <span>${task.text} at <span class="task-time">${formatTime(task.time)}</span></span>
        <span id='buttonspan'>
          <button class="edit" onclick="editTask(${task.id})">Edit</button>
          <button class="delete" onclick="deleteTask(${task.id})">Delete</button>
        </span>
      `;

      groupDiv.appendChild(item);
    });

    container.appendChild(groupDiv);
  }
}

searchInput.addEventListener("input", e => {
  renderTasks(e.target.value);
});

renderTasks();
document.querySelector("#add").addEventListener("click",addTask);
document.querySelector("#dismiss").addEventListener("click",()=>{
    dialog.close();
})
</script>
</body>
</html>
